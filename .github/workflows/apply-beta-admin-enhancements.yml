name: Apply beta admin enhancements

on:
  push:
    branches: [main]
    paths: ['.github/workflows/apply-beta-admin-enhancements.yml']

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Patch repository
        shell: bash
        run: |
          cat > /tmp/patch.py <<'PY'
          from pathlib import Path

          root = Path('.')

          # 1) New React panel for beta applications.
          panel = r'''import { useCallback, useEffect, useState } from 'react'
          import api from '../lib/api'

          const C = {
            surface:'#102129', elevated:'#172C36', border:'#1E3340', input:'#0F1E26',
            primary:'#B8A7FF', primaryDim:'rgba(184,167,255,0.12)', text:'#F5F7FA',
            text2:'#AAB6C2', muted:'#7E8FA3', success:'#4ADE80', successDim:'rgba(74,222,128,0.1)',
            warning:'#FBBF24', danger:'#F87171', dangerDim:'rgba(248,113,113,0.1)'
          }

          const statusLabel = { PENDING:'Pendente', INVITED:'Convidado', REJECTED:'Arquivado' }
          const statusColor = { PENDING:C.warning, INVITED:C.success, REJECTED:C.muted }

          export default function BetaApplicationsPanel() {
            const [items, setItems] = useState([])
            const [status, setStatus] = useState('ALL')
            const [loading, setLoading] = useState(true)
            const [busy, setBusy] = useState('')
            const [message, setMessage] = useState('')
            const [error, setError] = useState('')

            const load = useCallback(() => {
              setLoading(true); setError('')
              const query = status === 'ALL' ? '' : `?status=${status}`
              api.get(`/admin/beta/applications${query}`)
                .then(r => setItems(r.data.applications || []))
                .catch(e => setError(e.response?.data?.error || 'Não foi possível carregar os pedidos.'))
                .finally(() => setLoading(false))
            }, [status])

            useEffect(() => { load() }, [load])

            const invite = async item => {
              setBusy(item.id); setMessage(''); setError('')
              try {
                const r = await api.post(`/admin/beta/applications/${item.id}/invite`)
                setMessage(`Convite enviado para ${item.email}. Código: ${r.data.invite?.code || ''}`)
                load()
              } catch (e) {
                setError(e.response?.data?.error || 'Não foi possível enviar o convite.')
              } finally { setBusy('') }
            }

            const reject = async item => {
              if (!confirm(`Arquivar o pedido de ${item.email}?`)) return
              setBusy(item.id); setMessage(''); setError('')
              try {
                await api.put(`/admin/beta/applications/${item.id}/reject`)
                setMessage(`Pedido de ${item.email} arquivado.`)
                load()
              } catch (e) {
                setError(e.response?.data?.error || 'Não foi possível arquivar o pedido.')
              } finally { setBusy('') }
            }

            return (
              <section style={{ marginBottom:22 }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, flexWrap:'wrap', marginBottom:12 }}>
                  <div>
                    <div style={{ color:C.text, fontSize:16, fontWeight:600 }}>Pedidos de acesso da landing page</div>
                    <div style={{ color:C.muted, fontSize:12, marginTop:2 }}>Consulta os pedidos e envia convites diretamente.</div>
                  </div>
                  <select value={status} onChange={e => setStatus(e.target.value)} style={{ background:C.input, color:C.text, border:`1px solid ${C.border}`, borderRadius:9, padding:'8px 10px' }}>
                    <option value="ALL">Todos</option><option value="PENDING">Pendentes</option><option value="INVITED">Convidados</option><option value="REJECTED">Arquivados</option>
                  </select>
                </div>
                {message && <div style={{ color:C.success, background:C.successDim, border:`1px solid rgba(74,222,128,.25)`, borderRadius:10, padding:10, marginBottom:10, fontSize:12 }}>{message}</div>}
                {error && <div style={{ color:C.danger, background:C.dangerDim, border:`1px solid rgba(248,113,113,.25)`, borderRadius:10, padding:10, marginBottom:10, fontSize:12 }}>{error}</div>}
                <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, overflow:'hidden' }}>
                  {loading && <div style={{ padding:20, textAlign:'center', color:C.muted }}>A carregar…</div>}
                  {!loading && items.length === 0 && <div style={{ padding:24, textAlign:'center', color:C.muted }}>Não existem pedidos neste estado.</div>}
                  {!loading && items.map((item, index) => (
                    <div key={item.id} style={{ padding:'12px 14px', borderTop:index ? `1px solid ${C.border}` : 'none', display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
                      <div style={{ flex:1, minWidth:220 }}>
                        <div style={{ color:C.text, fontSize:14, fontWeight:500 }}>{item.email}</div>
                        <div style={{ color:C.muted, fontSize:11, marginTop:3 }}>{new Date(item.createdAt).toLocaleString('pt-PT')} · {item.source || 'LANDING_PAGE'}</div>
                        {item.inviteCode && <div style={{ color:C.text2, fontSize:11, marginTop:3 }}>Convite: {item.inviteCode}{item.inviteUsedAt ? ' · utilizado' : ''}</div>}
                      </div>
                      <span style={{ color:statusColor[item.status] || C.muted, background:C.elevated, border:`1px solid ${C.border}`, borderRadius:999, padding:'4px 9px', fontSize:11 }}>{statusLabel[item.status] || item.status}</span>
                      <div style={{ display:'flex', gap:7 }}>
                        {item.status !== 'INVITED' && <button disabled={busy===item.id} onClick={() => invite(item)} style={{ background:C.primary, color:'#0A141A', border:0, borderRadius:8, padding:'8px 12px', fontWeight:600, cursor:'pointer', opacity:busy===item.id?.6:1 }}>{busy===item.id?'…':'Enviar convite'}</button>}
                        {item.status !== 'REJECTED' && <button disabled={busy===item.id} onClick={() => reject(item)} style={{ background:'none', color:C.muted, border:`1px solid ${C.border}`, borderRadius:8, padding:'8px 10px', cursor:'pointer' }}>Arquivar</button>}
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            )
          }
          '''
          # Fix accidental JS ternary ambiguity in generated source.
          panel = panel.replace("opacity:busy===item.id?.6:1", "opacity:busy===item.id?0.6:1")
          Path('client/src/components/BetaApplicationsPanel.jsx').parent.mkdir(parents=True, exist_ok=True)
          Path('client/src/components/BetaApplicationsPanel.jsx').write_text(panel, encoding='utf-8')

          # 2) Add invite-email sender.
          email_path = Path('server/src/lib/betaApplicationEmail.ts')
          email = email_path.read_text(encoding='utf-8')
          if 'sendBetaInviteEmail' not in email:
            email += r'''

          export async function sendBetaInviteEmail(email: string, inviteUrl: string) {
            if (!SENDGRID_API_KEY) throw new Error('SENDGRID_API_KEY is not configured')
            const safeEmail = escapeHtml(email)
            const safeUrl = escapeHtml(inviteUrl)
            const response = await fetch('https://api.sendgrid.com/v3/mail/send', {
              method: 'POST',
              headers: { Authorization: `Bearer ${SENDGRID_API_KEY}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({
                personalizations: [{ to: [{ email }] }],
                from: { email: EMAIL_FROM_ADDRESS, name: EMAIL_FROM_NAME },
                subject: 'O teu convite para o Between Us',
                content: [{ type: 'text/html', value: `<!doctype html><html lang="pt"><body style="font-family:Arial,sans-serif;background:#0A141A;color:#F5F7FA;padding:24px"><div style="max-width:560px;margin:auto;background:#102129;border:1px solid #1E3340;border-radius:16px;padding:28px"><h2 style="margin-top:0">O teu acesso beta está disponível</h2><p>Olá ${safeEmail},</p><p>O teu pedido foi aprovado. Usa o botão abaixo para criares a tua conta.</p><p><a href="${safeUrl}" style="display:inline-block;background:#B8A7FF;color:#0A141A;text-decoration:none;padding:13px 24px;border-radius:40px;font-weight:700">Aceitar convite</a></p><p style="color:#AAB6C2;font-size:12px;word-break:break-all">${safeUrl}</p></div></body></html>` }]
              })
            })
            if (!response.ok) {
              const body = await response.text().catch(() => '')
              throw new Error(`SendGrid ${response.status}: ${body.slice(0, 300)}`)
            }
          }
          '''
            email_path.write_text(email, encoding='utf-8')

          # 3) Admin backend routes and operational dashboard counts.
          admin_path = Path('server/src/routes/admin.ts')
          admin = admin_path.read_text(encoding='utf-8')
          admin = admin.replace("prisma.profile.count({ where: { status: 'PENDING_REVIEW', ...viaUser } })", "prisma.profile.count({ where: { status: 'PENDING_REVIEW' } })")
          admin = admin.replace("prisma.profilePhoto.count({ where: { moderationStatus: 'PENDING', profile: viaUser } })", "prisma.profilePhoto.count({ where: { moderationStatus: 'PENDING' } })")
          admin = admin.replace("prisma.report.count({ where: { status: 'PENDING', ...(includeTestData ? {} : { reporter: userFilter }) } })", "prisma.report.count({ where: { status: 'PENDING' } })")
          admin = admin.replace("prisma.verification.count({ where: { status: 'PENDING', ...viaUser } })", "prisma.verification.count({ where: { status: 'PENDING' } })")

          routes = r'''
          // ─── Beta applications from landing page ───────────────────────────────
          router.get('/beta/applications', requireAdmin('beta'), async (req: AuthRequest, res: Response) => {
            const status = String(req.query.status || 'ALL').toUpperCase()
            const allowed = ['ALL', 'PENDING', 'INVITED', 'REJECTED']
            if (!allowed.includes(status)) return res.status(400).json({ error: 'Estado inválido.' })
            const rows = status === 'ALL'
              ? await prisma.$queryRaw<any[]>`SELECT a.*, i."code" AS "inviteCode", i."usedAt" AS "inviteUsedAt" FROM "beta_applications" a LEFT JOIN LATERAL (SELECT "code", "usedAt" FROM "beta_invites" WHERE LOWER(COALESCE("email", '')) = LOWER(a."email") ORDER BY "createdAt" DESC LIMIT 1) i ON true ORDER BY a."createdAt" DESC`
              : await prisma.$queryRaw<any[]>`SELECT a.*, i."code" AS "inviteCode", i."usedAt" AS "inviteUsedAt" FROM "beta_applications" a LEFT JOIN LATERAL (SELECT "code", "usedAt" FROM "beta_invites" WHERE LOWER(COALESCE("email", '')) = LOWER(a."email") ORDER BY "createdAt" DESC LIMIT 1) i ON true WHERE a."status" = ${status} ORDER BY a."createdAt" DESC`
            res.json({ applications: rows })
          })

          router.post('/beta/applications/:id/invite', requireAdmin('beta'), async (req: AuthRequest, res: Response) => {
            try {
              const rows = await prisma.$queryRaw<Array<{ id:string, email:string, status:string }>>`SELECT "id", "email", "status" FROM "beta_applications" WHERE "id" = ${req.params.id} LIMIT 1`
              const application = rows[0]
              if (!application) return res.status(404).json({ error: 'Pedido não encontrado.' })
              const { randomBytes } = await import('crypto')
              const code = randomBytes(6).toString('hex').toUpperCase()
              const invite = await prisma.betaInvite.create({ data: { code, createdById: req.userId!, email: application.email, maxUses: 1 } })
              const inviteUrl = `${CLIENT_URL}/join/${code}`
              const { sendBetaInviteEmail } = await import('../lib/betaApplicationEmail')
              try {
                await sendBetaInviteEmail(application.email, inviteUrl)
              } catch (emailErr) {
                await prisma.betaInvite.delete({ where: { id: invite.id } }).catch(() => {})
                throw emailErr
              }
              await prisma.$executeRaw`UPDATE "beta_applications" SET "status" = 'INVITED', "updatedAt" = NOW() WHERE "id" = ${application.id}`
              await logAdminAction(req.userId!, 'INVITE_BETA_APPLICATION', 'beta_application', application.id, { newData: { email: application.email, inviteId: invite.id, code }, ipAddress: req.ip })
              res.json({ ok: true, invite, inviteUrl })
            } catch (err:any) {
              console.error('[BETA APPLICATION INVITE]', err.message)
              res.status(500).json({ error: 'Não foi possível enviar o convite.' })
            }
          })

          router.put('/beta/applications/:id/reject', requireAdmin('beta'), async (req: AuthRequest, res: Response) => {
            const changed = await prisma.$executeRaw`UPDATE "beta_applications" SET "status" = 'REJECTED', "updatedAt" = NOW() WHERE "id" = ${req.params.id}`
            if (!changed) return res.status(404).json({ error: 'Pedido não encontrado.' })
            await logAdminAction(req.userId!, 'REJECT_BETA_APPLICATION', 'beta_application', req.params.id, { ipAddress: req.ip })
            res.json({ ok: true })
          })

          '''
          marker = '// ─── Beta invites ─────────────────────────────────────────────────────────────'
          if "router.get('/beta/applications'" not in admin:
            admin = admin.replace(marker, routes + marker)
          admin_path.write_text(admin, encoding='utf-8')

          # 4) Insert panel in existing Beta tab without rewriting the component.
          page_path = Path('client/src/pages/AdminPage.jsx')
          page = page_path.read_text(encoding='utf-8')
          imp = "import BetaApplicationsPanel from '../components/BetaApplicationsPanel'\n"
          if imp not in page:
            page = page.replace("import { Logo } from '../lib/design'\n", "import { Logo } from '../lib/design'\n" + imp)
          if '<BetaApplicationsPanel />' not in page:
            lines = page.splitlines()
            invite_idx = next(i for i,l in enumerate(lines) if 'setInvites' in l and 'useState' in l)
            func_idx = max(i for i in range(invite_idx, -1, -1) if lines[i].lstrip().startswith('function '))
            return_idx = next(i for i in range(invite_idx, len(lines)) if 'return (' in lines[i])
            div_idx = next(i for i in range(return_idx+1, min(return_idx+12, len(lines))) if '<div' in lines[i])
            indent = lines[div_idx][:len(lines[div_idx])-len(lines[div_idx].lstrip())] + '  '
            lines.insert(div_idx+1, indent + '<BetaApplicationsPanel />')
            page = '\n'.join(lines) + '\n'
          page_path.write_text(page, encoding='utf-8')
          PY
          python /tmp/patch.py
          npm --prefix server run typecheck
          npm --prefix client run build
          rm .github/workflows/apply-beta-admin-enhancements.yml
          git config user.name "BetweenUs Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: manage beta applications and align admin queues [skip ci]"
          git push origin main

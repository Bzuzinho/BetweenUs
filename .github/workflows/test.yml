name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks on pull request commits
        if: github.event_name == 'pull_request'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LOG_OPTS: ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

      - name: Run gitleaks on main history
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    name: Run test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: betweenus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Validate Prisma schema
        working-directory: server
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Push schema to test database
        working-directory: server
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Backend typecheck (tsc --noEmit)
        working-directory: server
        run: npm run typecheck

      - name: Run backend tests
        working-directory: server
        shell: bash
        run: |
          set +e
          npm test > backend-test.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Backend test failure summary"
            tail -n 250 backend-test.log
            echo "::endgroup::"
          else
            tail -n 40 backend-test.log
          fi
          exit "$status"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: ci-jwt-secret-not-production
          JWT_REFRESH_SECRET: ci-refresh-secret-not-production
          NODE_ENV: test
          BETA_CLOSED: "false"
          CONTACT_HASH_SECRET: ci-contact-hash-secret
          CLIENT_URL: http://localhost:3000
          ADMIN_EMAILS: admin@test.com

      - name: Upload backend test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: server/backend-test.log
          retention-days: 7

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Frontend build
        working-directory: client
        run: npm run build

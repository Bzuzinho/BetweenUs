name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Security follow-up — secret scanning. Separate, fast job (no DB/Redis
  # services needed) so a leaked-secret finding blocks the PR/merge
  # independently of whether the test suite itself passes. Scans full git
  # history via fetch-depth: 0 (gitleaks needs the real history to check
  # commits, not just the working tree) — this is exactly the gap that let
  # the JWT_SECRET/JWT_REFRESH_SECRET exposure in commit 487b622 go
  # unnoticed until a manual audit (Sprint 11.5) caught it.
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    name: Run test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: betweenus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      # 11.5.4 — Prisma schema validity, checked before generate so a
      # malformed schema fails fast with a schema-specific error instead of
      # a confusing generate/type-check failure downstream.
      - name: Validate Prisma schema
        working-directory: server
        run: npx prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Push schema to test database
        working-directory: server
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      # 11.5.4 — backend TypeScript baseline. Runs against the REAL
      # generated Prisma Client (unlike a sandbox with no network access to
      # Prisma's engine binaries, where the client falls back to an
      # unresolved `any` stub and produces unrelated implicit-any noise) —
      # this is the authoritative "0 errors" check for the project.
      - name: Backend typecheck (tsc --noEmit)
        working-directory: server
        run: npm run typecheck

      - name: Run backend tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: ci-jwt-secret-not-production
          JWT_REFRESH_SECRET: ci-refresh-secret-not-production
          NODE_ENV: test
          BETA_CLOSED: "false"
          CONTACT_HASH_SECRET: ci-contact-hash-secret
          CLIENT_URL: http://localhost:3000
          ADMIN_EMAILS: admin@test.com

      # 11.5.4 — client has no TypeScript/test suite (plain JS/JSX + Vite);
      # `vite build` is the meaningful "does this compile" signal for it,
      # equivalent in spirit to the backend typecheck step above.
      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Frontend build
        working-directory: client
        run: npm run build

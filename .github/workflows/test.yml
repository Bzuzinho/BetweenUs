name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: betweenus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Push schema to test database
        working-directory: server
        run: npx prisma db push --force-reset --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/betweenus_test
          REDIS_URL: redis://localhost:6379/1
          JWT_SECRET: ci-jwt-secret-not-production
          JWT_REFRESH_SECRET: ci-refresh-secret-not-production
          NODE_ENV: test
          BETA_CLOSED: "false"
          CONTACT_HASH_SECRET: ci-contact-hash-secret
          CLIENT_URL: http://localhost:3000
          ADMIN_EMAILS: admin@test.com

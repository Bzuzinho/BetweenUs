name: Trigger beta admin enhancements
on:
  push:
    branches: [main]
    paths: ['.github/workflows/trigger-beta-admin-enhancements.yml']
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Extract and apply patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-beta-admin-enhancements.yml').read_text()
          start = text.index("          from pathlib import Path")
          end = text.index("          PY\n", start)
          block = text[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/patch.py').write_text('\n'.join(lines) + '\n')
          PY
          python /tmp/patch.py
          npm --prefix server run typecheck
          npm --prefix client run build
          rm .github/workflows/apply-beta-admin-enhancements.yml
          rm .github/workflows/trigger-beta-admin-enhancements.yml
          git config user.name "BetweenUs Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat: manage beta applications and align admin queues [skip ci]"
          git push origin main
